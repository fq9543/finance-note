<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人理财笔记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", "黑体", sans-serif !important;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .panel-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        /* 表单样式 */
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-success:hover {
            background: #059669;
        }
        /* 账户列表 */
        .account-list {
            margin-top: 20px;
        }
        .bank-group {
            margin-bottom: 20px;
        }
        .bank-header {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bank-total {
            color: #667eea;
            font-weight: bold;
        }
        .account-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid;
            transition: transform 0.2s;
        }
        .account-card:hover {
            transform: translateX(5px);
        }
        .account-info {
            flex: 1;
        }
        .account-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .account-bank {
            font-size: 12px;
            color: #888;
        }
        .account-balance {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        .account-actions {
            margin-left: 15px;
        }
        .account-actions button {
            padding: 5px 10px;
            margin-left: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-edit {
            background: #3b82f6;
            color: white;
        }
        .btn-delete {
            background: #ef4444;
            color: white;
        }
        /* 颜色选择器 */
        .color-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
        }
        .color-option:hover, .color-option.selected {
            border-color: #333;
            transform: scale(1.1);
        }
        /* 柱状图 */
        .chart-container {
            margin-top: 20px;
        }
        .chart-bar {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .chart-label {
            width: 100px;
            font-size: 13px;
            color: #555;
            text-align: right;
            padding-right: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chart-bar-container {
            flex: 1;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        .chart-bar-fill {
            height: 100%;
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding-left: 10px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            min-width: 50px;
            transition: width 0.5s ease;
        }
        .chart-value {
            margin-left: 10px;
            font-weight: bold;
            color: #333;
            min-width: 80px;
        }
        /* 总计 */
        .total-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
        }
        .total-label {
            font-size: 14px;
            opacity: 0.9;
        }
        .total-amount {
            font-size: 32px;
            font-weight: bold;
            margin-top: 5px;
        }
        /* 导出按钮 */
        .export-section {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 400px;
            max-width: 90%;
        }
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧：账户管理 -->
        <div class="panel">
            <div class="panel-title">💰 存款账户管理</div>
            
            <!-- 添加账户表单 -->
            <div class="form-group">
                <label>账户名称</label>
                <input type="text" id="accountName" placeholder="例如：工资卡">
            </div>
            <div class="form-group">
                <label>银行名称</label>
                <input type="text" id="bankName" placeholder="例如：工商银行">
            </div>
            <div class="form-group">
                <label>账户颜色</label>
                <div class="color-picker" id="colorPicker">
                    <div class="color-option selected" style="background: #10B981" data-color="#10B981"></div>
                    <div class="color-option" style="background: #3B82F6" data-color="#3B82F6"></div>
                    <div class="color-option" style="background: #8B5CF6" data-color="#8B5CF6"></div>
                    <div class="color-option" style="background: #EC4899" data-color="#EC4899"></div>
                    <div class="color-option" style="background: #F59E0B" data-color="#F59E0B"></div>
                    <div class="color-option" style="background: #EF4444" data-color="#EF4444"></div>
                    <div class="color-option" style="background: #06B6D4" data-color="#06B6D4"></div>
                    <div class="color-option" style="background: #84CC16" data-color="#84CC16"></div>
                </div>
            </div>
            <div class="form-group">
                <label>余额（元）</label>
                <input type="number" id="balance" placeholder="0.00" step="0.01">
            </div>
            
            <button class="btn btn-primary" onclick="addAccount()" style="width: 100%;">
                ➕ 添加账户
            </button>
            
            <!-- 账户列表 -->
            <div class="account-list" id="accountList"></div>
            
            <!-- 总计 -->
            <div class="total-section" id="totalSection">
                <div class="total-label">💵 存款总计</div>
                <div class="total-amount" id="totalAmount">¥ 0.00</div>
            </div>
            
            <!-- 导出 -->
            <div class="export-section">
                <button class="btn btn-success" onclick="exportData()">📤 导出数据</button>
                <button class="btn btn-primary" onclick="importData()">📥 导入数据</button>
                <button class="btn btn-danger" onclick="clearAll()">🗑️ 清空</button>
            </div>
        </div>
        
        <!-- 右侧：柱状图 -->
        <div class="panel">
            <div class="panel-title">📊 资产分布图</div>
            <div class="chart-container" id="chartContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📈</div>
                    <div>添加账户后即可查看图表</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 编辑模态框 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-title">✏️ 编辑账户</div>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>账户名称</label>
                <input type="text" id="editName">
            </div>
            <div class="form-group">
                <label>银行名称</label>
                <input type="text" id="editBank">
            </div>
            <div class="form-group">
                <label>账户颜色</label>
                <div class="color-picker" id="editColorPicker">
                    <div class="color-option" style="background: #10B981" data-color="#10B981"></div>
                    <div class="color-option" style="background: #3B82F6" data-color="#3B82F6"></div>
                    <div class="color-option" style="background: #8B5CF6" data-color="#8B5CF6"></div>
                    <div class="color-option" style="background: #EC4899" data-color="#EC4899"></div>
                    <div class="color-option" style="background: #F59E0B" data-color="#F59E0B"></div>
                    <div class="color-option" style="background: #EF4444" data-color="#EF4444"></div>
                    <div class="color-option" style="background: #06B6D4" data-color="#06B6D4"></div>
                    <div class="color-option" style="background: #84CC16" data-color="#84CC16"></div>
                </div>
            </div>
            <div class="form-group">
                <label>余额（元）</label>
                <input type="number" id="editBalance" step="0.01">
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="saveEdit()">💾 保存</button>
                <button class="btn" onclick="closeModal()" style="background: #e0e0e0; color: #333;">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 数据存储
        let accounts = [];
        let selectedColor = '#10B981';
        let editSelectedColor = '#10B981';

        // 初始化
        function init() {
            loadData();
            render();
            setupColorPicker();
        }

        // 加载数据
        function loadData() {
            const saved = localStorage.getItem('financeAccounts');
            if (saved) {
                accounts = JSON.parse(saved);
            }
        }

        // 保存数据
        function saveData() {
            localStorage.setItem('financeAccounts', JSON.stringify(accounts));
        }

        // 设置颜色选择器
        function setupColorPicker() {
            document.querySelectorAll('.color-option').forEach(option => {
                option.addEventListener('click', function() {
                    const picker = this.parentElement;
                    picker.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    if (picker.id === 'colorPicker') {
                        selectedColor = this.dataset.color;
                    } else {
                        editSelectedColor = this.dataset.color;
                    }
                });
            });
        }

        // 添加账户
        function addAccount() {
            const name = document.getElementById('accountName').value.trim();
            const bank = document.getElementById('bankName').value.trim();
            const balance = parseFloat(document.getElementById('balance').value) || 0;

            if (!name) {
                alert('请输入账户名称');
                return;
            }
            if (!bank) {
                alert('请输入银行名称');
                return;
            }

            // 生成唯一ID（银行+名称组合）
            const id = bank + '_' + name;

            // 检查是否已存在
            const exists = accounts.find(a => a.id === id);
            if (exists) {
                alert('该账户已存在！');
                return;
            }

            accounts.push({
                id: id,
                name: name,
                bank: bank,
                color: selectedColor,
                balance: balance,
                createdAt: Date.now()
            });

            // 重置表单
            document.getElementById('accountName').value = '';
            document.getElementById('balance').value = '';

            saveData();
            render();
        }

        // 删除账户
        function deleteAccount(id) {
            if (confirm('确定要删除这个账户吗？')) {
                accounts = accounts.filter(a => a.id !== id);
                saveData();
                render();
            }
        }

        // 打开编辑模态框
        function openEditModal(id) {
            const account = accounts.find(a => a.id === id);
            if (!account) return;

            document.getElementById('editId').value = id;
            document.getElementById('editName').value = account.name;
            document.getElementById('editBank').value = account.bank;
            document.getElementById('editBalance').value = account.balance;
            editSelectedColor = account.color;

            // 设置颜色选中
            document.querySelectorAll('#editColorPicker .color-option').forEach(o => {
                o.classList.remove('selected');
                if (o.dataset.color === account.color) {
                    o.classList.add('selected');
                }
            });

            document.getElementById('editModal').classList.add('active');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        // 保存编辑
        function saveEdit() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value.trim();
            const bank = document.getElementById('editBank').value.trim();
            const balance = parseFloat(document.getElementById('editBalance').value) || 0;

            if (!name || !bank) {
                alert('请填写完整信息');
                return;
            }

            const newId = bank + '_' + name;
            
            // 如果ID改变了，检查是否冲突
            if (newId !== id) {
                const exists = accounts.find(a => a.id === newId);
                if (exists) {
                    alert('该账户已存在！');
                    return;
                }
            }

            const index = accounts.findIndex(a => a.id === id);
            if (index !== -1) {
                accounts[index] = {
                    ...accounts[index],
                    id: newId,
                    name: name,
                    bank: bank,
                    color: editSelectedColor,
                    balance: balance
                };
            }

            closeModal();
            saveData();
            render();
        }

        // 按银行分组
        function groupByBank() {
            const groups = {};
            accounts.forEach(acc => {
                if (!groups[acc.bank]) {
                    groups[acc.bank] = [];
                }
                groups[acc.bank].push(acc);
            });
            return groups;
        }

        // 渲染
        function render() {
            renderAccountList();
            renderChart();
            updateTotal();
        }

        // 渲染账户列表
        function renderAccountList() {
            const container = document.getElementById('accountList');
            
            if (accounts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💳</div>
                        <div>还没有添加任何账户</div>
                    </div>
                `;
                return;
            }

            const groups = groupByBank();
            let html = '';

            // 按银行分组渲染
            Object.keys(groups).sort().forEach(bank => {
                const bankAccounts = groups[bank];
                const bankTotal = bankAccounts.reduce((sum, acc) => sum + acc.balance, 0);
                
                html += `
                    <div class="bank-group">
                        <div class="bank-header">
                            <span>🏦 ${bank}</span>
                            <span class="bank-total">¥ ${bankTotal.toLocaleString('zh-CN', {minimumFractionDigits: 2})}</span>
                        </div>
                `;

                bankAccounts.forEach(acc => {
                    html += `
                        <div class="account-card" style="border-left-color: ${acc.color}; background: linear-gradient(to right, ${acc.color}08, white);">
                            <div class="account-info">
                                <div class="account-name">${acc.name}</div>
                                <div class="account-bank">${acc.bank}</div>
                            </div>
                            <div class="account-balance">¥ ${acc.balance.toLocaleString('zh-CN', {minimumFractionDigits: 2})}</div>
                            <div class="account-actions">
                                <button class="btn-edit" onclick="openEditModal('${acc.id}')">✏️</button>
                                <button class="btn-delete" onclick="deleteAccount('${acc.id}')">🗑️</button>
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
            });

            container.innerHTML = html;
        }

        // 渲染柱状图
        function renderChart() {
            const container = document.getElementById('chartContainer');
            
            if (accounts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📈</div>
                        <div>添加账户后即可查看图表</div>
                    </div>
                `;
                return;
            }

            const total = accounts.reduce((sum, acc) => sum + acc.balance, 0);
            const groups = groupByBank();
            
            // 计算每个银行的总额并排序
            const bankTotals = Object.keys(groups).map(bank => ({
                bank: bank,
                total: groups[bank].reduce((sum, acc) => sum + acc.balance, 0),
                color: groups[bank][0].color // 使用第一账户的颜色
            })).sort((a, b) => b.total - a.total);

            let html = '';
            
            bankTotals.forEach(item => {
                const percentage = total > 0 ? (item.total / total * 100) : 0;
                const width = Math.max(percentage, 5); // 最小宽度5%
                
                html += `
                    <div class="chart-bar">
                        <div class="chart-label" title="${item.bank}">${item.bank}</div>
                        <div class="chart-bar-container">
                            <div class="chart-bar-fill" style="width: ${width}%; background: ${item.color};">
                                ${percentage.toFixed(1)}%
                            </div>
                        </div>
                        <div class="chart-value">¥ ${item.total.toLocaleString('zh-CN', {minimumFractionDigits: 2})}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 更新总计
        function updateTotal() {
            const total = accounts.reduce((sum, acc) => sum + acc.balance, 0);
            document.getElementById('totalAmount').textContent = '¥ ' + total.toLocaleString('zh-CN', {minimumFractionDigits: 2});
        }

        // 导出数据
        function exportData() {
            const data = JSON.stringify(accounts, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '理财笔记_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // 导入数据
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (Array.isArray(imported)) {
                            if (confirm(`将导入 ${imported.length} 个账户，是否继续？`)) {
                                accounts = imported;
                                saveData();
                                render();
                                alert('导入成功！');
                            }
                        } else {
                            alert('文件格式不正确');
                        }
                    } catch (err) {
                        alert('导入失败：' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // 清空所有数据
        function clearAll() {
            if (confirm('确定要清空所有数据吗？此操作不可恢复！')) {
                accounts = [];
                saveData();
                render();
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
